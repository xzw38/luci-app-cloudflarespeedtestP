name: Compile cloudflarespeedtest LuCI App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version from Makefile
        id: build
        shell: bash
        run: |
          version=$(grep 'PKG_VERSION:=' Makefile | awk -F ':=' '{print $2}' | xargs)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Current Makefile Version: ${version}"

      - name: Install system dependencies and po2lmo
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git tar zstd python3-pip
          pip3 install --upgrade pip
          pip3 install po2lmo

      - name: Download legacy OpenWrt SDK
        shell: bash
        run: |
          mkdir -p /tmp/SDK
          curl -SLk --connect-timeout 30 --retry 2 \
            "https://archive.openwrt.org/releases/21.02.0/targets/x86/64/openwrt-sdk-21.02.0-x86-64_gcc-8.4.0_musl.Linux-x86_64.tar.xz" \
            -o /tmp/SDK.tar.xz
          tar xf /tmp/SDK.tar.xz --strip-components=1 -C /tmp/SDK

      - name: Download snapshot OpenWrt SDK
        shell: bash
        run: |
          mkdir -p /tmp/SNAPSDK
          curl -SLk --connect-timeout 30 --retry 2 \
            "https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst" \
            -o /tmp/SNAPSDK.tar.zst
          zstd -d /tmp/SNAPSDK.tar.zst
          tar xf /tmp/SNAPSDK.tar --strip-components=1 -C /tmp/SNAPSDK

      - name: Copy source into SDKs
        shell: bash
        run: |
          mkdir -p /tmp/SDK/package/luci-app-cloudflarespeedtest
          mkdir -p /tmp/SNAPSDK/package/luci-app-cloudflarespeedtest
          rsync -avh --exclude='.git' . /tmp/SDK/package/luci-app-cloudflarespeedtest
          rsync -avh --exclude='.git' . /tmp/SNAPSDK/package/luci-app-cloudflarespeedtest

      - name: Compile IPK with legacy SDK
        shell: bash
        run: |
          cd /tmp/SDK
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-cloudflarespeedtest
          echo "CONFIG_PACKAGE_luci-app-cloudflarespeedtest=y" > .config
          make defconfig
          make package/luci-app-cloudflarespeedtest/compile V=99

      - name: Compile APK with snapshot SDK
        shell: bash
        run: |
          cd /tmp/SNAPSDK
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-cloudflarespeedtest
          echo "CONFIG_PACKAGE_luci-app-cloudflarespeedtest=y" > .config
          make defconfig
          make package/luci-app-cloudflarespeedtest/compile V=99

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp /tmp/SDK/bin/packages/x86_64/base/luci-*_all.ipk ./artifacts/
          cp /tmp/SNAPSDK/bin/packages/x86_64/base/luci-*.apk ./artifacts/
          echo "v${{ steps.build.outputs.version }}" > artifacts/version.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: LuCI-Package-${{ steps.build.outputs.version }}
          path: artifacts

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./artifacts/*
          name: Release v${{ steps.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
